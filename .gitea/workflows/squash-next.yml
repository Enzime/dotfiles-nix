name: Squash next branch
on:
  pull_request:
    types: [closed]
    branches: [next]
  workflow_dispatch:
jobs:
  squash-next:
    runs-on: nix
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.HYPERBOT_GITEA_TOKEN }}
      - name: Squash next into single commit on top of main
        env:
          GITEA_TOKEN: ${{ secrets.HYPERBOT_GITEA_TOKEN }}
          GITEA_URL: ${{ github.server_url }}
          GITEA_REPO: ${{ github.repository }}
        run: nix run .#gitea-squash-next
